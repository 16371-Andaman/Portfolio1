        * {

        body {

        /* ส่วนของแบนเนอร์ด้านบน (Hero Banner) */
        .banner {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: #ffffff;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .banner h1 {
            font-family: 'Kanit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .banner p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* ส่วนเนื้อหาหลัก (Main Content) */
        .container {
            max-width: 1000px;
            margin: -40px auto 40px auto; /* ดันเนื้อหาขึ้นไปทับแบนเนอร์เล็กน้อยให้มีมิติ */
            padding: 0 20px;
        }

        /* การ์ดโปรไฟล์ */
        .profile-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            margin-bottom: 40px;
        }

        /* กรอบรูปนักเรียน */
        .profile-img-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-card h2 {
            font-family: 'Kanit', sans-serif;
            font-size: 1.8rem;
            color: #0f172a;
            margin-bottom: 5px;
        }

        .profile-card .student-info {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 20px;
        }

        /* คติประจำใจ */
        .motto-box {
            background: #f1f5f9;
            border-left: 4px solid #3b82f6;
            padding: 15px;

            max-width: 600px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
        }

        .motto-box p {
            font-style: italic;
            color: #334155;
            font-size: 1.05rem;
        }
